# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — DEM012 Mini Data Platform
#
# Jobs:
#   ci  — lint + unit tests + Docker image build  (all branches / PRs)
#   cd  — full E2E deploy → seed → DAG run → validate → teardown
#         (main branch only, after ci passes)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  # Used by docker-compose and the validate script.
  # Non-secret values are set here; secrets come from repository settings.
  POSTGRES_USER: airflow
  POSTGRES_PASSWORD: airflow
  POSTGRES_DB: airflow
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  MINIO_ENDPOINT: http://localhost:9000
  MINIO_BUCKET: clickstream-data
  METABASE_URL: http://localhost:3000
  # Airflow
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@localhost:5432/airflow
  AIRFLOW_UID: "50000"
  # Metabase
  MB_DB_TYPE: postgres
  MB_DB_DBNAME: metabase
  MB_DB_PORT: "5432"
  MB_DB_USER: airflow
  MB_DB_PASS: airflow
  MB_DB_HOST: postgres

# ─── CI job ──────────────────────────────────────────────────────────────────
jobs:
  ci:
    name: Lint · Test · Build image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Build custom Airflow Docker image
        run: docker build -f docker/airflow/Dockerfile .

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest tests/ -v

# ─── CD job ──────────────────────────────────────────────────────────────────
  cd:
    name: Deploy · E2E Validate
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      # ── Generate Airflow keys if repo secrets are not set ───────────────────
      - name: Generate Airflow secrets
        id: airflow_secrets
        run: |
          if [ -n "${{ secrets.AIRFLOW_FERNET_KEY }}" ]; then
            echo "fernet_key=${{ secrets.AIRFLOW_FERNET_KEY }}" >> $GITHUB_OUTPUT
          else
            echo "fernet_key=$(python3 -c 'import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())')" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ secrets.AIRFLOW_SECRET_KEY }}" ]; then
            echo "secret_key=${{ secrets.AIRFLOW_SECRET_KEY }}" >> $GITHUB_OUTPUT
          else
            echo "secret_key=$(python3 -c 'import secrets; print(secrets.token_hex(32))')" >> $GITHUB_OUTPUT
          fi

      # ── Write .env so docker-compose can read it ────────────────────────────
      - name: Write .env file
        run: |
          cat <<EOF > .env
          POSTGRES_USER=airflow
          POSTGRES_PASSWORD=airflow
          POSTGRES_DB=airflow
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          MINIO_ENDPOINT=http://minio:9000
          MINIO_BUCKET=clickstream-data
          AIRFLOW__CORE__EXECUTOR=LocalExecutor
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
          AIRFLOW__CORE__FERNET_KEY=${{ steps.airflow_secrets.outputs.fernet_key }}
          AIRFLOW__WEBSERVER__SECRET_KEY=${{ steps.airflow_secrets.outputs.secret_key }}
          AIRFLOW_UID=50000
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GROQ_REQUESTS_PER_SECOND=0.8
          AI_ENRICHMENT_FAIL_OPEN=true
          AI_ENRICHMENT_FALLBACK_CATEGORY=Other
          MB_DB_TYPE=postgres
          MB_DB_DBNAME=metabase
          MB_DB_PORT=5432
          MB_DB_USER=airflow
          MB_DB_PASS=airflow
          MB_DB_HOST=postgres
          EOF

      # ── Start the platform ─────────────────────────────────────────────────
      - name: Start platform with Docker Compose
        run: docker compose up -d --build

      - name: Show airflow-init logs on startup failure
        if: failure()
        run: docker compose logs --no-color --tail=200 airflow-init

      - name: Wait for all services to become healthy
        run: |
          set -euo pipefail
          echo "Waiting for services..."
          timeout 300 bash -c '
            while true; do
              pending=$(docker compose ps --format json \
                | python3 -c "
          import sys, json
          items = [json.loads(l) for l in sys.stdin if l.strip()]
          pending = []
          for i in items:
              if i.get(\"Service\") == \"airflow-init\":
                  continue
              service = i.get(\"Service\", \"unknown\")
              state = (i.get(\"State\") or \"\").lower()
              health = (i.get(\"Health\") or \"\").lower()
              if state != \"running\":
                  pending.append(\"{}:state={}\".format(service, state or \"unknown\"))
              elif health and health != \"healthy\":
                  pending.append(\"{}:health={}\".format(service, health))
          print(\" \".join(pending))
          " 2>/dev/null || echo "unknown")

              if [ -z "$pending" ]; then
                echo "All non-init services are running and healthy."
                break
              fi

              echo "Still waiting for: $pending"
              sleep 10
            done
          '

      - name: Wait for Airflow API readiness
        run: |
          set -euo pipefail
          echo "Waiting for Airflow API..."
          timeout 180 bash -c '
            until curl --fail --silent --show-error \
              --retry 5 --retry-all-errors --retry-delay 2 \
              -u admin:admin \
              "http://localhost:8080/api/v1/health" > /dev/null; do
              echo "Airflow API not ready yet..."
              sleep 5
            done
          '

      - name: Show service status
        run: docker compose ps

      # ── Seed data ─────────────────────────────────────────────────────────
      - name: Generate and upload sample data to MinIO
        env:
          MINIO_ENDPOINT: http://localhost:9000
          NUM_USERS: "120"
          NUM_PRODUCTS: "20"
          NUM_EVENTS: "800"
        run: uv run python data_generator/generate_data.py

      # ── Trigger the Airflow DAG ────────────────────────────────────────────
      - name: Trigger clickstream_pipeline DAG
        id: trigger_dag
        run: |
          set -euo pipefail
          DAG_RUN_ID="ci_cd_run_${{ github.run_id }}"
          echo "dag_run_id=$DAG_RUN_ID" >> $GITHUB_OUTPUT

          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 --max-time 30 \
            -X PATCH \
            "http://localhost:8080/api/v1/dags/clickstream_pipeline" \
            -H "Content-Type: application/json" \
            -u admin:admin \
            -d '{"is_paused": false}' > /dev/null

          curl --fail --silent --show-error \
            --retry 12 --retry-all-errors --retry-delay 5 --max-time 30 \
            -X POST \
            "http://localhost:8080/api/v1/dags/clickstream_pipeline/dagRuns" \
            -H "Content-Type: application/json" \
            -u admin:admin \
            -d "{\"dag_run_id\": \"$DAG_RUN_ID\"}" \
            | python3 -m json.tool

      - name: Show Airflow webserver logs on DAG trigger failure
        if: failure()
        run: docker compose logs --no-color --tail=200 airflow-webserver

      # ── Poll until DAG succeeds (or timeout) ──────────────────────────────
      - name: Wait for DAG run to complete
        run: |
          set -euo pipefail
          DAG_RUN_ID="${{ steps.trigger_dag.outputs.dag_run_id }}"
          MAX_WAIT=600   # 10 minutes
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATE=$(curl --fail --silent --show-error \
              --retry 6 --retry-all-errors --retry-delay 3 --max-time 20 \
              "http://localhost:8080/api/v1/dags/clickstream_pipeline/dagRuns/$DAG_RUN_ID" \
              -u admin:admin \
              | python3 -c "import sys, json; print(json.load(sys.stdin).get('state','unknown'))")

            echo "DAG state: $STATE  (${ELAPSED}s elapsed)"

            case "$STATE" in
              success)
                echo "DAG run succeeded."
                exit 0
                ;;
              failed)
                echo "DAG run FAILED."
                echo "Failed task instances:"
                curl --fail --silent --show-error \
                  --retry 6 --retry-all-errors --retry-delay 3 --max-time 20 \
                  "http://localhost:8080/api/v1/dags/clickstream_pipeline/dagRuns/$DAG_RUN_ID/taskInstances?limit=200" \
                  -u admin:admin \
                  | python3 -c "import json,sys; items=json.load(sys.stdin).get('task_instances', []); failed=[t for t in items if t.get('state') in ('failed','upstream_failed')]; print('\n'.join('  - {}: state={} try={}'.format(t.get('task_id'), t.get('state'), t.get('try_number')) for t in failed) if failed else '  (none reported)')"
                exit 1
                ;;
              *)
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
            esac
          done

          echo "Timed out waiting for DAG run."
          exit 1

      - name: Show Airflow logs on DAG failure
        if: failure()
        run: |
          docker compose logs --no-color --tail=200 airflow-scheduler
          docker compose logs --no-color --tail=200 airflow-webserver

      # ── E2E validation ────────────────────────────────────────────────────
      - name: Run E2E data flow validation
        env:
          MINIO_ENDPOINT: http://localhost:9000
          POSTGRES_HOST: localhost
          METABASE_URL: http://localhost:3000
        run: uv run python scripts/validate_data_flow.py

      # ── Tear down ─────────────────────────────────────────────────────────
      - name: Tear down Docker Compose
        if: always()
        run: docker compose down -v
